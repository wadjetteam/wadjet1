kind = "web"
previewPath = "/"
title = "Wadjet GRC"
version = "1.0.0"
id = "artifacts/wadjet-grc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19535

[services.development]
run = "pnpm --filter @workspace/wadjet-grc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wadjet-grc", "run", "build" ]
publicDir = "artifacts/wadjet-grc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19535"
BASE_PATH = "/"
